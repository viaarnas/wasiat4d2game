<!DOCTYPE html>
<html lang="id">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>WASIAT4D2. Lucky Card Games</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="assets/iconotp.png">
    </head>

    <body>
        

        <div class="container">
            <div class="logo">
                <img src="assets/logow2.png" alt="Logo Wasiat4d2">
            </div>
            <div class="banner-wrap">
                <img src="assets/finalpromo.jpg" alt="Promo Game Lucky Card">
                <p>Klik Untuk Lihat Hadiah.</p>
            </div>
            
            <h1>Selamat Datang Di WASIAT4D2</h1>

            <div class="main" id="main">
                <h2>Sudah punya akun?</h2>
                <div class="two-btn-wrapper">
                    <div class="photo-btn pbtn" id="photo-btn-1">
                        <img src="assets/tombolsudah.png" alt="sudah punya akun">
                        <p>SUDAH PUNYA</p>
                    </div>

                    <div class="photo-btn pbtn" id="photo-btn-2">
                        <img src="assets/tombolbelum.png" alt="belum punya akun">
                        <p>BELUM PUNYA</p>
                    </div>
                </div>
            </div>

            <div class="pop-up" id="popUp">
                <div id="popContent"></div>
            </div>
        </div>
    </body>

    <script>
        const sudah = document.getElementById("photo-btn-1");
        const belum = document.getElementById("photo-btn-2");
        const popUp = document.getElementById("popUp");
        const popUpContent = document.getElementById("popContent");
        const mainContent = document.getElementById("main");
        let STAGE = "IDLE";
        let confirmedUser = "";

        function renderDetails() {
            return `
                <h3>Cara Bermain & Hadiah</h3>
                <ol>
                    <li>Pastikan sudah punya akun di WASIAT4D2</li>
                    <li>Masukkan username akun WASIAT4D2</li>
                    <li>Klik tombol ACAK untuk mengacak dadu</li>
                    <li>Klik tombol STOP untuk berhenti mengacak</li>
                    <li>ScreenShot dan claim hadiahnya!</li>    
                </ol>

                <table>
                    <tr>
                        <th colspan="3">Hadiah</th>    
                    </tr>
                    <tr>
                        <td>Hadiah 1</td>
                        <td>Bonus Deposit 10%</td>
                        <td>Jumlah angka dadu = 1 - 6</td>
                    </tr>
                    <tr>
                        <td>Hadiah 2</td>
                        <td>Bonus NEW MEMBER 20%</td>
                        <td>Jumlah angka dadu = 7 - 12</td>
                    </tr>
                    <tr>
                        <td>Hadiah 3</td>
                        <td>Saldo Gratis Rp 200RB</td>
                        <td>Jumlah angka dadu = 13 - 18</td>
                    </tr>
                    <tr>
                        <th colspan="3">Hadiah Spesial</th>
                    </tr>
                    <tr>
                        <td>Hadiah Spesial</td>
                        <td>Saldo Gratis Rp 1JUTA</td>
                        <td>3 Angka Dadu Sama<br>
                            Contoh: ⚀ - ⚀ - ⚀</td>
                    </tr>
                </table>
                <button type="button" value="x" class="back-btn x-btn">Tutup</button>
            `
        }

        function renderPlayed() {
            const data = JSON.parse(localStorage.getItem("finalGameResult"));

            if (!data) return "";

            let message = "";

            if (popUp.style.visibility === "visible") {
                message = "🎉 Selamat! Kamu berhasil menyelesaikan permainan";
            } else {
             message = "🎁 Kamu sudah pernah bermain";
            }

            return `
                <div class="played-card">

                    <div class="played-header">
                     ${message}
                    </div>

                    <div class="user-info">
                        Username :
                        <span>${data.username}</span>
                    </div>

                    <div class="dice-container played-dice">
                        <div class="dice">
                            ${diceFaces[data.dice[0] - 1]}
                        </div>

                        <div class="dice">
                            ${diceFaces[data.dice[1] - 1]}
                        </div>

                        <div class="dice">
                            ${diceFaces[data.dice[2] - 1]}
                        </div>
                    </div>

                    <div class="result-box">
                        <div class="result-title">
                            HASIL PERMAINAN
                        </div>

                        <div class="result-total">
                            Jumlah Dadu : <b>${data.total}</b>
                        </div>

                        <div class="result-hadiah">
                            🎁 Hadiah :
                            <b>Bonus NEW MEMBER 20%</b>
                        </div>
                    </div>

                    <button
                        type="button"
                        class="confirm-btn claim-btn"
                        onclick="claimHadiah();">
                        CLAIM HADIAH
                    </button>

                </div>
            `;
        }

        function claimHadiah() {
            window.open("https://wasiat4d2.info/", "_blank", "noopener,noreferrer");
            popUp.style.visibility = "hidden";
            window.location.reload();
        }

        function renderInputUser() {
            return `
                <h3>Silahkan Masukkan Username</h3>
                <input type="text" id="username" placeholder="Masukkan Username Di sini" required>
                <div class="two-btn-wrapper">
                    <button type="button" class="back-btn" value="kembali">KEMBALI</button>
                    <button type="button" class="confirm-btn" value="konfirmasi" id="user-submit">KONFIRMASI</button>
                </div>
            `
        }

        function shakeInput(input) {
            input.classList.add("shake");

            setTimeout(() => {
                input.classList.remove("shake");
            }, 300);
        }

        function setInvalid(input) {
            input.classList.add("invalid");
        }

        function setPlaceholder(input) {
            const userValue = input.value.trim();
            if (!userValue) {
                input.placeholder = "Username wajib diisi!";
                return;
            } else if (userValue.length < 6) {
                input.placeholder = "Username minimal 6 karakter!";
                return;
            } else if (userValue.length > 16) {
                input.placeholder = "Username maksimal 16 karakter!";
                return;
            } else if (/[^a-zA-Z0-9]/.test(userValue)) {
                input.placeholder = "Username hanya huruf dan angka!";
                return;
            }
        }

        function userValidation(input) {
            const userValue = input.value.trim();
            return /^[a-zA-Z0-9]{6,16}$/.test(userValue);
        }

        function renderDaftar() {
            return `
                <h3>Silahkan Daftarkan Akun Terlebih Dahulu</h3>
                <div class="two-btn-wrapper">
                    <button type="button" class="back-btn" value="kembali">TUTUP</button>
                    <button type="button" class="confirm-btn" value="daftar">DAFTAR</button>
                </div>
            `
        }

        function renderGame() {
            return `
                <h2>Halo, ${confirmedUser}! Silahkan acak dadu untuk mulai.</h2>
                <div class="dice-container">
                    <div class="dice" id="dice1">
                        ⚀
                    </div>

                    <div class="dice" id="dice2">
                        ⚀
                    </div>

                    <div class="dice" id="dice3">
                        ⚀
                    </div>
                </div>
                <p class="total" id="total"></p>
                <button style="color:red" type="button" onclick="toggleDice()" id="play">Acak</button>
            `
        }

        function launchConfetti() {
            const colors = [
                "#facc15",
                "#ef4444",
                "#22c55e",
                "#3b82f6",
                "#a855f7",
                "#ec4899"
            ];

            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement("div");
                confetti.className = "confetti";

                const fromLeft = Math.random() < 0.5;

                confetti.style.top = Math.random() * window.innerHeight + "px";
                confetti.style.left = fromLeft
                    ? "-10px"
                    : window.innerWidth + "px";
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = (Math.random() * 8 + 6) + "px";
                confetti.style.height = confetti.style.width;
                confetti.style.setProperty("--dir", fromLeft ? 1 : -1);
                confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";

                document.body.appendChild(confetti);

                setTimeout(() => {
                   confetti.remove() 
                }, 5000);
            }
        }

        function render() {
            if (STAGE === "IDLE" && localStorage.getItem("finalGameResult")) {
                mainContent.innerHTML = renderPlayed();
                requestAnimationFrame(() => {
                    launchConfetti();
                });
                return;
            }

            if(STAGE === "INPUTUSER") {
                popUpContent.innerHTML = renderInputUser();
            }

            if(STAGE === "DAFTAR") {
                popUpContent.innerHTML = renderDaftar();
            }

            if(STAGE === "STARTGAME") {
                mainContent.innerHTML = renderGame();
            }
        }

        const diceFaces = [
            "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"
        ];

        let rolling;
        let isRolling = false;

        function toggleDice() {
            const dices = document.querySelectorAll(".dice");

            if(!isRolling) {
                rolling = setInterval(() => {
                    dices.forEach((dice) => {
                        let random = Math.floor(Math.random() * 6);
                        dice.innerHTML = diceFaces[random];
                    });
                }, 100);

                isRolling = true;
                document.getElementById("play").innerHTML = "Stop";
            } else {
                clearInterval(rolling);
                let result;
                let total;
                let allSame;

                do {
                    results = [
                        Math.floor(Math.random() * 6) + 1,
                        Math.floor(Math.random() * 6) + 1,
                        Math.floor(Math.random() * 6) + 1
                    ];

                    total = results[0] + results[1] + results[2];

                    allSame = 
                    results[0] === results[1] &&
                    results[1] === results[2];
                } while (
                    total < 7 ||
                    total > 12 ||
                    allSame
                );

                dices.forEach((dice,index) => {
                    dice.innerHTML = diceFaces[results[index] - 1];
                });

                document.getElementById("play").innerHTML = "SELESAI";
                document.getElementById("play").disabled = true;
                document.getElementById("total").innerHTML = "Jumlah Angka Dadu = " + total;

                const gameResult = {
                    username: confirmedUser,
                    dice: results,
                    total: total
                };
                
                localStorage.setItem("finalGameResult", JSON.stringify(gameResult));

                setTimeout(() => {
                    popUp.style.visibility = "visible";
                    popUpContent.innerHTML = renderPlayed();
                    launchConfetti();
                    STAGE = "IDLE";
                }, 1200);

                isRolling = false;
            }
        }

        sudah.addEventListener("click", (e) => {
            e.preventDefault();
            popUp.style.visibility = "visible";
            STAGE = "INPUTUSER";
            render();
        });

        belum.addEventListener("click", (e) => {
            e.preventDefault();
            popUp.style.visibility = "visible";
            STAGE = "DAFTAR";
            render();
        });

        const detailPromo = document.querySelector(".banner-wrap");

        detailPromo.addEventListener("click", (e) => {
            e.preventDefault();
            popUp.style.visibility = "visible";
            popUpContent.innerHTML = renderDetails();
        });

        popUpContent.addEventListener("click", (e) => {
            if (e.target.classList.contains("back-btn") && e.target.value === "kembali") {
                popUp.style.visibility = "hidden";
                STAGE = "IDLE";
            }

            if (e.target.classList.contains("back-btn") && e.target.value === "x") {
                popUp.style.visibility = "hidden";
            }

            if (e.target.classList.contains("confirm-btn") && e.target.value === "daftar") {
                window.open("https://wasiat4d2.info/register", "_blank", "noopener,noreferrer");
                popUp.style.visibility = "hidden";
                STAGE = "IDLE";
            }

            if (e.target.classList.contains("confirm-btn") && e.target.value === "konfirmasi") {
                const userInput = document.getElementById("username");
                if (!userInput) return;
                if (!userValidation(userInput)) {
                    shakeInput(userInput);
                    setInvalid(userInput);
                    setPlaceholder(userInput);
                    userInput.value = "";
                    return;
                } else {
                    popUp.style.visibility = "hidden";
                    STAGE = "STARTGAME";
                    confirmedUser = userInput.value.trim();
                    render();
                }
            }
        });

        window.addEventListener("load", () => {
            render();
        });
    </script>
</html>
